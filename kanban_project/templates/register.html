<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Kanban Project</title>
    <style>
        :root {
            --primary-color: #50e3c2; /* Teal accent for Register */
            --secondary-color: #4a90e2; /* Blue for Login */
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .register-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
            color: var(--text-color);
            font-weight: 600;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 5px rgba(74, 144, 226, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #357abd;
            transform: translateY(-1px);
        }

        .footer-links {
            margin-top: 20px;
            font-size: 14px;
        }

        .footer-links a {
            color: #764ba2;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Create Account</h2>
        <p>Join the team and start organizing tasks</p>
        
        <div class="input-group">
            <label for="username">Choose Username</label>
            <input type="text" id="username" placeholder="e.g. developer_ayush">
        </div>

        <div class="input-group">
            <label for="password">Create Password</label>
            <input type="password" id="password" placeholder="Minimum 6 characters">
        </div>

        <button onclick="authRegister()">Sign Up</button>

        <div class="footer-links">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>

    <script>
        async function authRegister() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(!user || !pass) {
                alert("Please fill in all fields");
                return;
            }

            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            if (res.ok) {
                alert("Registration successful! Please login.");
                window.location.href = '/login';
            } else {
                const data = await res.json();
                alert(data.msg || "Registration failed. Try a different username.");
            }
        }
    </script>
</body>
</html>
